<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雪人语生成器</title>
    <style>
        :root {
            --primary-color: #5c88b5;
            --primary-hover: #4a7097;
            --bg-gradient-start: #e8f4f8;
            --bg-gradient-end: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #2c3e50;
            --text-muted: #7f8c8d;
            --border-color: #dce4ec;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 680px;
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(92, 136, 181, 0.08);
            padding: 40px;
            transition: transform 0.3s ease;
        }

        .header {
            text-align: center;
            margin-bottom: 35px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 600;
            color: var(--primary-color);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .header p {
            margin-top: 10px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .input-group {
            margin-bottom: 25px;
        }

        textarea {
            width: 100%;
            height: 140px;
            padding: 18px;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            font-size: 15px;
            line-height: 1.6;
            resize: vertical;
            color: var(--text-main);
            background-color: #fafbfc;
            transition: all 0.3s ease;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(92, 136, 181, 0.1);
        }

        textarea::placeholder {
            color: #bdc3c7;
        }

        .action-bar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 30px;
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        button:hover:not(:disabled) {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(92, 136, 181, 0.2);
        }

        button:active:not(:disabled) {
            transform: translateY(0);
        }

        button:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
            opacity: 0.8;
        }

        .error-message {
            background-color: #fde8e8;
            color: #c53030;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
            border-left: 4px solid #f56565;
        }

        .output-container {
            position: relative;
            background: #f8fafd;
            border: 1px solid #e1e8ed;
            border-radius: 12px;
            min-height: 120px;
            padding: 24px;
            display: none;
        }

        .output-container.visible {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        #output {
            white-space: pre-wrap;
            line-height: 1.8;
            font-size: 15px;
            color: #34495e;
            letter-spacing: 0.3px;
        }

        /* 简单的加载动画指示器 */
        .loading-indicator {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: var(--primary-color);
            animation: typing 1.4s infinite ease-in-out both;
            margin-left: 4px;
            opacity: 0;
        }

        .loading-indicator.active {
            opacity: 1;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes typing {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        .length-control {
            margin-bottom: 25px;
        }

        .length-control label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .length-control label span {
            font-weight: 500;
            color: var(--primary-color);
            font-size: 14px;
        }

        .length-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: var(--border-color);
            outline: none;
            cursor: pointer;
        }

        .length-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--primary-color);
            cursor: pointer;
            transition: background 0.2s ease, transform 0.2s ease;
        }

        .length-slider::-webkit-slider-thumb:hover {
            background: var(--primary-hover);
            transform: scale(1.2);
        }

        .length-slider::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--primary-color);
            cursor: pointer;
            border: none;
        }

        .length-marks {
            display: flex;
            justify-content: space-between;
            margin-top: 6px;
            font-size: 12px;
            color: #bdc3c7;
        }

        .copy-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            background-color: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 400;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .copy-btn:hover:not(:disabled) {
            background-color: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
            transform: none;
            box-shadow: none;
        }

        .copy-btn.copied {
            background-color: #27ae60;
            color: white;
            border-color: #27ae60;
        }

        @media (max-width: 600px) {
            .container { padding: 25px 20px; }
            .header h1 { font-size: 24px; }
            button { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>❄️ 雪人语生成器</h1>
            <p>将简短的文本转换为冗长且充满心理描写的风格</p>
        </div>

        <div id="errorMessage" class="error-message"></div>

        <div class="input-group">
            <textarea id="inputText" placeholder="输入你想表达的核心内容..."></textarea>
        </div>

        <div class="length-control">
            <label for="lengthSlider">
                目标字数（参考）
                <span id="lengthValue">300 字</span>
            </label>
            <input
                type="range"
                id="lengthSlider"
                class="length-slider"
                min="100"
                max="800"
                step="50"
                value="300"
                oninput="updateLengthLabel(this.value)"
            >
            <div class="length-marks">
                <span>100</span>
                <span>300</span>
                <span>500</span>
                <span>800</span>
            </div>
        </div>

        <div class="action-bar">
            <button id="generateBtn" onclick="generateText()">
                <span>开始生成</span>
            </button>
        </div>

        <div id="outputContainer" class="output-container">
            <button id="copyBtn" class="copy-btn" onclick="copyOutput()" style="display:none;" title="复制文本">
                <span>📋</span><span id="copyBtnText">复制</span>
            </button>
            <div id="output"></div>
            <span id="loadingIndicator" class="loading-indicator"></span>
        </div>
    </div>

    <script>
        // 部署时将此处替换为 Vercel 提供的后端域名
        const BACKEND_URL = 'https://yukitogo-generator.vercel.app'; 

        function updateLengthLabel(value) {
            document.getElementById('lengthValue').innerText = `${value} 字`;
        }

        async function generateText() {
            const inputText = document.getElementById('inputText').value.trim();
            const maxChars = parseInt(document.getElementById('lengthSlider').value, 10);
            const outputContainer = document.getElementById('outputContainer');
            const outputDiv = document.getElementById('output');
            const generateBtn = document.getElementById('generateBtn');
            const errorMessage = document.getElementById('errorMessage');
            const loadingIndicator = document.getElementById('loadingIndicator');
            const copyBtn = document.getElementById('copyBtn');

            if (!inputText) return;

            // 状态重置
            outputDiv.innerText = '';
            outputContainer.classList.add('visible');
            generateBtn.disabled = true;
            generateBtn.querySelector('span').innerText = '生成中...';
            errorMessage.style.display = 'none';
            loadingIndicator.classList.add('active');
            copyBtn.style.display = 'none';

            try {
                const response = await fetch(`${BACKEND_URL}/api/generate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: inputText, maxChars }),
                });

                if (!response.ok) throw new Error(`服务端异常: ${response.status}`);

                const reader = response.body.getReader();
                const decoder = new TextDecoder('utf-8');

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    outputDiv.innerText += decoder.decode(value, { stream: true });
                }
            } catch (error) {
                errorMessage.innerText = error.message;
                errorMessage.style.display = 'block';
                if (outputDiv.innerText === '') {
                    outputContainer.classList.remove('visible');
                }
            } finally {
                generateBtn.disabled = false;
                generateBtn.querySelector('span').innerText = '开始生成';
                loadingIndicator.classList.remove('active');
                if (outputDiv.innerText.trim() !== '') {
                    copyBtn.style.display = 'flex';
                }
            }
        }

        async function copyOutput() {
            const outputDiv = document.getElementById('output');
            const copyBtn = document.getElementById('copyBtn');
            const copyBtnText = document.getElementById('copyBtnText');
            const text = outputDiv.innerText.trim();
            if (!text) return;

            try {
                await navigator.clipboard.writeText(text);
            } catch (_e) {
                // Fallback for older browsers
                const textarea = document.createElement('textarea');
                textarea.value = text;
                textarea.style.position = 'fixed';
                textarea.style.opacity = '0';
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
            }

            copyBtn.classList.add('copied');
            copyBtnText.innerText = '已复制！';
            setTimeout(() => {
                copyBtn.classList.remove('copied');
                copyBtnText.innerText = '复制';
            }, 2000);
        }
    </script>

</body>
</html>
